# PrismGateway — example configuration
# Copy to config.yaml and adjust for your environment.
# Provider API keys go in .env (see .env.example)

server:
  host: 0.0.0.0
  port: 8080
  log_mode: metadata_only   # metadata_only | redacted | full

auth:
  mode: api_key   # api_key | jwt | both
  jwt:
    issuer: ""
    audience: ""
    jwks_url: ""
  required_claims:
    tenant_id: tenant_id
    roles: roles
  rbac:
    admin_roles: [admin]
    user_roles: [user]

dynamic_config:
  enabled: true
  cache_ttl_ms: 5000

circuit_breaker:
  backend: in_memory   # in_memory | redis
  defaults:
    failure_threshold: 5
    success_threshold: 2
    open_timeout_seconds: 30

tenants:
  - id: default
    name: Default Tenant
    api_keys:
      - change-me-before-using
    selection:
      strategy: latency_based   # round_robin | latency_based | cost_based | header_based | smart
      route_groups:
        default:
          - openai/gpt-4o-mini
          - anthropic/claude-3-haiku-20240307
    budget_enforcement:
      mode: block   # report_only | block | degrade
      thresholds:
        warn_pct: 0.80
        hard_pct: 1.00
    budgets:
      monthly_usd: 100.0
    rate_limit:
      rpm: 60
    logging:
      mode: metadata_only   # disabled | metadata_only | redacted | full

models:
  - name: openai/gpt-4o-mini
    provider: openai
    model: gpt-4o-mini
    pricing:
      prompt_per_1m: 0.15
      completion_per_1m: 0.60
  - name: anthropic/claude-3-haiku-20240307
    provider: anthropic
    model: claude-3-haiku-20240307
    pricing:
      prompt_per_1m: 0.25
      completion_per_1m: 1.25
  - name: google/gemini-1.5-flash
    provider: gemini
    model: gemini-1.5-flash
    pricing:
      prompt_per_1m: 0.075
      completion_per_1m: 0.30
