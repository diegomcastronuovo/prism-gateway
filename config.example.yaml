# PrismGateway — example configuration
# Copy to config.yaml and adjust for your environment.
# Provider API keys go in .env (see .env.example)

auth:
  mode: api_key   # api_key | jwt | both
  jwt:
    issuer: ""
    audience: ""
    jwks_url: ""
  required_claims:
    tenant_id: tenant_id
    roles: roles
  rbac:
    admin_roles: [admin]
    user_roles: [user]

dynamic_config:
  enabled: true
  cache_ttl_ms: 5000

circuit_breaker:
  backend: redis   # in_memory | redis
  defaults:
    failure_threshold: 5
    success_threshold: 2
    open_timeout_seconds: 30

tenants:
  - id: default
    name: Default Tenant
    selection:
      strategy: latency_based   # round_robin | latency_based | cost_based | header_based | smart
      route_groups:
        - name: default
          models:
            - openai/gpt-4o-mini
            - anthropic/claude-3-haiku-20240307
    budget:
      monthly_limit_usd: 100.0
      warn_threshold_pct: 80
      hard_threshold_pct: 100
      enforce_mode: block   # block | degrade | log
    rate_limit:
      requests_per_minute: 60
      scope: tenant   # tenant | api_key | jwt_sub
    logging:
      level: metadata   # none | metadata | full

models:
  - name: openai/gpt-4o-mini
    provider: openai
    model: gpt-4o-mini
    pricing:
      prompt_per_1m_usd: 0.15
      completion_per_1m_usd: 0.60
  - name: anthropic/claude-3-haiku-20240307
    provider: anthropic
    model: claude-3-haiku-20240307
    pricing:
      prompt_per_1m_usd: 0.25
      completion_per_1m_usd: 1.25
  - name: google/gemini-1.5-flash
    provider: gemini
    model: gemini-1.5-flash
    pricing:
      prompt_per_1m_usd: 0.075
      completion_per_1m_usd: 0.30
